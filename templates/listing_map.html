<!DOCTYPE html>
<!-- Utilizes Leaflet: https://leafletjs.com/ -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Map - Rate My Housing</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4a5fd9 0%, #5a3d99 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
            flex-shrink: 0;
        }

        .topbar-brand {
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .nav-btn-ghost {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
        }

        .nav-btn-ghost:hover { background: rgba(255,255,255,0.25); transform: translateY(-1px); }

        .nav-btn-green {
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: white;
        }

        .nav-btn-green:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(22,163,74,0.4); }

        /* ── Listing count pill ── */
        .listing-count {
            color: rgba(255,255,255,0.75);
            font-size: 13px;
            font-weight: 500;
        }

        /* ── Main layout ── */
        .main {
            flex: 1;
            display: flex;
            gap: 0;
            overflow: hidden;
            height: calc(100vh - 61px);
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(6px);
            border-right: 1px solid rgba(255,255,255,0.12);
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-title {
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 0 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 4px;
        }

        .sidebar-card {
            background: white;
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 2px solid transparent;
        }

        .sidebar-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        .sidebar-card.active {
            border-color: #4a5fd9;
            box-shadow: 0 0 0 3px rgba(74,95,217,0.2);
        }

        .sidebar-card-address {
            font-size: 13px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-card-meta {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: #777;
        }

        .sidebar-card-price {
            margin-left: auto;
            font-size: 12px;
            font-weight: 700;
            color: #4a5fd9;
        }

        .no-listings {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }

        /* ── Map ── */
        .map-wrap {
            flex: 1;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* ── Custom Leaflet popup styling ── */
        .leaflet-popup-content-wrapper {
            border-radius: 12px !important;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2) !important;
            padding: 0 !important;
            overflow: hidden;
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: 220px !important;
        }

        .popup-inner {
            padding: 14px 16px;
        }

        .popup-address {
            font-weight: 700;
            font-size: 14px;
            color: #333;
            margin-bottom: 6px;
        }

        .popup-meta {
            font-size: 12px;
            color: #777;
            margin-bottom: 10px;
            display: flex;
            gap: 8px;
        }

        .popup-price {
            font-size: 15px;
            font-weight: 800;
            color: #4a5fd9;
            margin-bottom: 12px;
        }

        .popup-link {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #4a5fd9, #5a3d99);
            color: white;
            text-decoration: none;
            padding: 8px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 0 0 12px 12px;
            transition: opacity 0.15s;
        }

        .popup-link:hover { opacity: 0.9; }

        /* ── Scrollbar ── */
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="/" class="topbar-brand">🏠 Rate My Housing</a>
        <div class="topbar-nav">
            <span class="listing-count" id="listingCount"></span>
            <a href="/listings" class="nav-btn nav-btn-ghost">List View</a>
            <a href="/dashboard" class="nav-btn nav-btn-ghost">← Dashboard</a>
            <a href="/create_listing" class="nav-btn nav-btn-green">+ New Listing</a>
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-title">Listings</div>
            <div id="sidebarList"></div>
        </div>
        <div class="map-wrap">
            <div id="map"></div>
        </div>
    </div>

    <script>
        const listings = {{ listings | tojson }};

        // Update count pill
        const mappable = listings.filter(l => "CoordinateLat" in l && "CoordinateLong" in l);
        document.getElementById("listingCount").textContent =
            mappable.length + " listing" + (mappable.length !== 1 ? "s" : "") + " on map";

        // Init map centred on CWRU
        const map = L.map('map').setView([41.505, -81.605], 14);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Custom marker icon using app colours
        const markerIcon = L.divIcon({
            className: '',
            html: `<div style="
                width:32px; height:32px; border-radius:50% 50% 50% 0;
                background:linear-gradient(135deg,#4a5fd9,#5a3d99);
                transform:rotate(-45deg);
                border:3px solid white;
                box-shadow:0 3px 10px rgba(0,0,0,0.3);
            "></div>`,
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -36]
        });

        const sidebarList = document.getElementById("sidebarList");
        const markerMap = {};

        if (listings.length === 0) {
            sidebarList.innerHTML = '<div class="no-listings">No listings available.</div>';
        }

        for (const listing of listings) {
            // Sidebar card for every listing
            const card = document.createElement("div");
            card.className = "sidebar-card";
            card.innerHTML = `
                <div class="sidebar-card-address">📍 ${listing.ListingLocation || listing.Address || "Unknown address"}</div>
                <div class="sidebar-card-meta">
                    <span>🛏 ${listing.Beds ?? "—"}</span>
                    <span>🚿 ${listing.Baths ?? "—"}</span>
                    <span>📐 ${listing.SquareFootage ?? "—"} sqft</span>
                    <span class="sidebar-card-price">$${listing.Price ?? "—"}/mo</span>
                </div>
            `;

            if ("CoordinateLat" in listing && "CoordinateLong" in listing) {
                const popupContent = `
                    <div class="popup-inner">
                        <div class="popup-address">${listing.ListingLocation || listing.Address}</div>
                        <div class="popup-meta">
                            <span>🛏 ${listing.Beds} bed${listing.Beds !== 1 ? "s" : ""}</span>
                            <span>🚿 ${listing.Baths} bath${listing.Baths !== 1 ? "s" : ""}</span>
                        </div>
                        <div class="popup-price">$${listing.Price}/mo</div>
                    </div>
                    <a class="popup-link" href="/listing/${listing.ListingID}">View Listing →</a>
                `;

                const marker = L.marker([listing.CoordinateLat, listing.CoordinateLong], { icon: markerIcon })
                    .bindPopup(popupContent)
                    .addTo(map);

                markerMap[listing.ListingID] = marker;

                card.addEventListener("click", () => {
                    map.flyTo([listing.CoordinateLat, listing.CoordinateLong], 16, { duration: 0.8 });
                    marker.openPopup();
                    document.querySelectorAll(".sidebar-card").forEach(c => c.classList.remove("active"));
                    card.classList.add("active");
                });

                marker.on("click", () => {
                    document.querySelectorAll(".sidebar-card").forEach(c => c.classList.remove("active"));
                    card.classList.add("active");
                    card.scrollIntoView({ behavior: "smooth", block: "nearest" });
                });
            } else {
                // No coordinates — clicking scrolls map but can't fly
                card.style.opacity = "0.6";
                card.title = "No map coordinates for this listing";
            }

            sidebarList.appendChild(card);
        }
    </script>
</body>
</html>
