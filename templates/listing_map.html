<!DOCTYPE html>
<!-- 
    Utilizes Leaflet
    https://leafletjs.com/
-->
<head>
    <title>Listing Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
    <style>
        .mapbox { display: flex; justify-content: center; }
        #map { height: 50em; width: 60em; }
    </style>
</head>
<body>
    <div class="mapbox">
        <div id="map"></div>
    </div>
    <a href="/dashboard">&lt;&lt; Back to Dashboard </a>
    
    <script>
        var map = L.map('map').setView([41.505, -81.605], 14);
        L.tileLayer(
            'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                maxZoom: 19,
                attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }
        ).addTo(map);
        
        const listings = {{listings | tojson}};
        for(const listing of listings){
            if(("CoordinateLat" in listing) && ("CoordinateLong" in listing)) {
                L.marker([listing.CoordinateLat, listing.CoordinateLong])
                .bindPopup(
                    "<b>"+listing.Address+"</b>" + "</br>" +
                    "<a href=\"listing/"+listing.ListingID+"\">More Info >></a>"
                )
                .openPopup()
                .addTo(map);
            }
        }
            
    </script>
</body>
