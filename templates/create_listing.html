<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Listing - Rate My Housing</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4a5fd9 0%, #5a3d99 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 520px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 { margin: 0 0 6px 0; font-size: 32px; color: #333; }
        .header p { margin: 0; color: #888; font-size: 15px; }

        hr { border: none; border-top: 2px solid #e0e0e0; margin: 28px 0; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 20px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.3s;
            color: #333;
            background: white;
        }

        input:focus, textarea:focus { outline: none; border-color: #4a5fd9; }

        textarea { resize: vertical; min-height: 100px; line-height: 1.5; }

        .button-group { display: flex; gap: 12px; margin-top: 8px; }

        .btn-primary {
            flex: 2;
            padding: 14px;
            background: linear-gradient(135deg, #4a5fd9 0%, #5a3d99 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(74,95,217,0.4); }

        .btn-secondary {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(107,114,128,0.4); }

        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #d32f2f;
            margin-bottom: 20px;
        }

        .success {
            color: #2e7d32;
            background: #e8f5e9;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #2e7d32;
            margin-bottom: 20px;
        }

        .price-wrap { position: relative; }
        .price-wrap span { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #888; font-size: 15px; pointer-events: none; }
        .price-wrap input { padding-left: 28px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Rate My Housing</h1>
            <p>Add a new housing listing</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="success">{{ success }}</div>
        {% endif %}

        <hr>

        <form method="post">
            <div class="form-group">
                <label>Listing Name</label>
                <input type="text" name="name" placeholder="e.g. Sunny Studio on Euclid" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" placeholder="123 Main St, Cleveland, OH" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Beds</label>
                    <input type="number" name="beds" min="0" placeholder="e.g. 3" required>
                </div>
                <div class="form-group">
                    <label>Baths</label>
                    <input type="number" name="baths" min="0" placeholder="e.g. 2" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Square Footage</label>
                    <input type="number" name="sqft" min="0" placeholder="e.g. 900" required>
                </div>
                <div class="form-group">
                    <label>Price / Month</label>
                    <div class="price-wrap">
                        <span>$</span>
                        <input type="number" name="price" step="0.01" min="0" placeholder="1200.00" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Description <span style="font-weight:400; color:#aaa;">(optional)</span></label>
                <textarea name="description" placeholder="Describe the property — amenities, proximity to campus, pet policy, etc."></textarea>
            </div>

            <div class="button-group">
                <a href="/node/classct015/8000/dashboard" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">Create Listing</button>
            </div>
        </form>
    </div>
</body>
</html>
