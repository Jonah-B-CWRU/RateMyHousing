<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Comment - Rate My Housing</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4a5fd9 0%, #5a3d99 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0 0 6px 0;
            font-size: 32px;
            color: #333;
        }

        .header p {
            margin: 0;
            color: #888;
            font-size: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            resize: vertical;
            min-height: 140px;
            transition: border-color 0.3s;
            color: #333;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: #4a5fd9;
        }

        textarea::placeholder {
            color: #bbb;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button[type="submit"] {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(22, 163, 74, 0.4);
        }

        .cancel-btn {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cancel-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(107, 114, 128, 0.4);
        }

        hr {
            border: none;
            border-top: 2px solid #e0e0e0;
            margin: 28px 0;
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #aaa;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Rate My Housing</h1>
            <p>Share your thoughts with the community</p>
        </div>

        <hr>

        <form method="post">
            <label for="comment">Your Comment</label>
            <textarea
                id="comment"
                name="comment"
                placeholder="Write your comment here..."
                maxlength="500"
                oninput="document.getElementById('charCount').textContent = this.value.length"
            ></textarea>
            <div class="char-count"><span id="charCount">0</span> / 500 characters</div>

            <div class="button-group">
                <a href="/" class="cancel-btn">Cancel</a>
                <button type="submit">Post Comment</button>
            </div>
        </form>
    </div>
</body>
</html>
