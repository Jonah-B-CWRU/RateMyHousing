<!DOCTYPE html>
<head>
    <title>Mod Tools</title>
    <style>
        .navbar {
            top: 0;
            width: 100%;
            overflow: auto;
            position: sticky;
            border-bottom: 1px solid black;
            padding-bottom: 8px;
        }
        .content {
            padding: 16px;
        }
        .disabled_text {
            color: #868686;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <b>Mod Tools</b>
        <form action="/mod_page" method="POST">
            Search: <select id="search_type" onchange="check_content_search_valid(this)" style="margin-right:15px" name="search_type">
                <option></option>
                <option>Users</option>
                <option>Comments</option>
                <option>Listings</option>
                <option>Ratings</option>
            </select>
            <label stlye="display:inline" class="disabled_text" title="For Listings, this is the address" id="orph_label">
                Orphaned Data?
            </label>
            <input type="checkbox" id="get_orphaned" disabled onchange="check_content_search_valid(document.getElementById('search_type'))" name="get_orphaned"/>
            <input id="uid_search" placeholder="User ID" name="uid_search" disabled/>
            <input id="content_search" placeholder="Content" name="content_search" disabled/>
                <label style="display:inline;cursor:help;" class="disabled_text" title="For Listings, this is the address" id="help_label">(?)</label>
            <input style="margin-left:25px" id="submit" type="submit" disabled/>
        </form>
    </div>
    <div class="content">
        {% if content %}
        content
        {% else %}
        Input a search to view records
        {% endif %}
        
    </div>
    
    <script>
        function check_content_search_valid(dropdown) {
            const uid_search = document.getElementById("uid_search");
            const content_search = document.getElementById("content_search");
            const get_orphaned = document.getElementById("get_orphaned");
            const submit = document.getElementById("submit");
            const help_label = document.getElementById("help_label");
            const orph_label = document.getElementById("orph_label");
            if(dropdown.value === "") {
                submit.disabled = true;
            } else {
                submit.disabled = false;
            }
            if(!get_orphaned.checked){
                if(dropdown.value === "Users") {
                    uid_search.disabled = false;
                    content_search.disabled = true;
                    get_orphaned.disabled = true;
                    orph_label.classList.add("disabled_text")
                    help_label.classList.add("disabled_text")
                } else if(dropdown.value === "Listings") {
                    uid_search.disabled = false;
                    content_search.disabled = false;
                    get_orphaned.disabled = true;
                    orph_label.classList.add("disabled_text")
                    help_label.classList.remove("disabled_text")
                } else {
                    uid_search.disabled = false;
                    content_search.disabled = false;
                    get_orphaned.disabled = false;
                    orph_label.classList.remove("disabled_text")
                    help_label.classList.remove("disabled_text")
                }
            } else {
                uid_search.disabled = true;
                content_search.disabled = true;
                help_label.classList.add("disabled_text")
            }
        }
    </script>
    
</body>
